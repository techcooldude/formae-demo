name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type 'destroy' to confirm"
        required: true
        type: string

permissions:
  contents: read

jobs:
  destroy:
    if: github.event.inputs.confirm == 'destroy'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Formae
        run: |
          curl -fsSL https://hub.platform.engineering/setup/formae.sh | sudo bash -s -- -y
          echo "/opt/pel/formae/bin" >> $GITHUB_PATH

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Configure Formae CLI
        env:
          FORMAE_AGENT_URL: ${{ vars.FORMAE_AGENT_URL }}
        run: |
          mkdir -p ~/.config/formae
          AGENT_HOST=$(echo "$FORMAE_AGENT_URL" | sed 's|https\?://||' | cut -d: -f1)
          AGENT_PORT=$(echo "$FORMAE_AGENT_URL" | grep -oE ':[0-9]+$' | tr -d ':')
          AGENT_PORT=${AGENT_PORT:-49684}
          printf 'amends "formae:/Config.pkl"\n\ncli {\n    api {\n        url = "http://%s"\n        port = %s\n    }\n}\n' \
            "$AGENT_HOST" "$AGENT_PORT" > ~/.config/formae/formae.conf.pkl

      - name: Formae Destroy
        run: formae destroy --yes ec2-vm/main.pkl

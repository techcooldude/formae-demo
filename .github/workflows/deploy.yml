name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  TARGET_ENV: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  # ── Stage 1: Plan ─────────────────────────────────────────────────────────
  plan:
    name: Plan (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Formae
        run: |
          curl -fsSL https://hub.platform.engineering/setup/formae.sh | sudo bash -s -- -y
          echo "/opt/pel/formae/bin" >> $GITHUB_PATH
          PKL=$(find /opt/pel -name "pkl" -type f 2>/dev/null | head -1)
          [ -n "$PKL" ] && echo "$(dirname $PKL)" >> $GITHUB_PATH

      - name: Configure Formae CLI
        env:
          FORMAE_AGENT_URL: ${{ vars.FORMAE_AGENT_URL }}
        run: |
          mkdir -p ~/.config/formae
          AGENT_HOST=$(echo "$FORMAE_AGENT_URL" | sed 's|https\?://||' | cut -d: -f1)
          AGENT_PORT=$(echo "$FORMAE_AGENT_URL" | grep -oE ':[0-9]+$' | tr -d ':')
          AGENT_PORT=${AGENT_PORT:-49684}
          printf 'amends "formae:/Config.pkl"\n\ncli {\n    api {\n        url = "http://%s"\n        port = %s\n    }\n}\n' \
            "$AGENT_HOST" "$AGENT_PORT" > ~/.config/formae/formae.conf.pkl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Formae Plan
        id: plan
        run: |
          set +e
          formae apply --mode reconcile --simulate --yes --watch \
            --status-output-layout detailed ec2-vm/main.pkl 2>&1 \
            | sed 's/\x1b\[[0-9;]*[mJHKABCDlh]//g; s/\r//g' \
            > /tmp/formae-sim-raw.txt
          EXIT_CODE=${PIPESTATUS[0]}

          python3 - <<'PYEOF' | tee formae-plan.txt
import re, sys

text = open('/tmp/formae-sim-raw.txt').read()

# Extract resource actions from the simulate output (last state wins)
resources = {}
for line in text.splitlines():
    m = re.search(r'(create|update|delete|replace) resource ([^:│├└\s][^:]+?)\s*: (Success|Failed|InProgress|NotStarted)', line)
    if m:
        action, name, status = m.group(1), m.group(2).strip(), m.group(3)
        resources[name] = (action, status)

creates  = sum(1 for a,_ in resources.values() if a == 'create')
updates  = sum(1 for a,_ in resources.values() if a == 'update')
deletes  = sum(1 for a,_ in resources.values() if a == 'delete')
replaces = sum(1 for a,_ in resources.values() if a == 'replace')
total    = creates + updates + deletes + replaces

W = 50
print('═' * W)
print('  Formae Plan  ·  ec2-vm  ·  reconcile mode')
print('═' * W)
print()

SYM   = {'create': '+', 'update': '~', 'delete': '-', 'replace': '±'}
COLOR = {'create': '\033[32m', 'update': '\033[33m', 'delete': '\033[31m', 'replace': '\033[35m'}
RESET = '\033[0m'

if not resources:
    print('  No changes. Infrastructure is up-to-date.')
else:
    order = ['create', 'update', 'replace', 'delete']
    for action in order:
        for name, (act, status) in sorted(resources.items()):
            if act != action:
                continue
            sym    = SYM[action]
            clr    = COLOR[action]
            suffix = {'create':'will be created','update':'will be updated',
                      'delete':'will be destroyed','replace':'will be replaced'}[action]
            fail   = '  ✗ FAILED' if status == 'Failed' else ''
            print(f'  {clr}{sym} {name:<22}{RESET}  {suffix}{fail}')

print()
print('─' * W)
parts = []
if creates:  parts.append(f'\033[32m{creates} to add\033[0m')
if updates:  parts.append(f'\033[33m{updates} to change\033[0m')
if deletes:  parts.append(f'\033[31m{deletes} to destroy\033[0m')
if replaces: parts.append(f'\033[35m{replaces} to replace\033[0m')
if not parts: parts.append('\033[32m0 to add\033[0m, \033[33m0 to change\033[0m, \033[31m0 to destroy\033[0m')
print('  Plan: ' + ', '.join(parts))
print('═' * W)
PYEOF

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload plan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formae-plan-${{ env.TARGET_ENV }}-${{ github.run_id }}
          path: formae-plan.txt
          retention-days: 7

  # ── Stage 2: Apply (runs only after plan succeeds) ────────────────────────
  apply:
    name: Apply (${{ github.event.inputs.environment || 'staging' }})
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download plan output
        uses: actions/download-artifact@v4
        with:
          name: formae-plan-${{ env.TARGET_ENV }}-${{ github.run_id }}

      - name: Show plan summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Applying the following plan:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat formae-plan.txt

      - name: Install Formae
        run: |
          curl -fsSL https://hub.platform.engineering/setup/formae.sh | sudo bash -s -- -y
          echo "/opt/pel/formae/bin" >> $GITHUB_PATH
          PKL=$(find /opt/pel -name "pkl" -type f 2>/dev/null | head -1)
          [ -n "$PKL" ] && echo "$(dirname $PKL)" >> $GITHUB_PATH

      - name: Configure Formae CLI
        env:
          FORMAE_AGENT_URL: ${{ vars.FORMAE_AGENT_URL }}
        run: |
          mkdir -p ~/.config/formae
          AGENT_HOST=$(echo "$FORMAE_AGENT_URL" | sed 's|https\?://||' | cut -d: -f1)
          AGENT_PORT=$(echo "$FORMAE_AGENT_URL" | grep -oE ':[0-9]+$' | tr -d ':')
          AGENT_PORT=${AGENT_PORT:-49684}
          printf 'amends "formae:/Config.pkl"\n\ncli {\n    api {\n        url = "http://%s"\n        port = %s\n    }\n}\n' \
            "$AGENT_HOST" "$AGENT_PORT" > ~/.config/formae/formae.conf.pkl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Formae Apply
        run: |
          formae eval ec2-vm/main.pkl > /dev/null 2>&1 || true
          set +e
          formae apply --mode reconcile --yes --watch --status-output-layout detailed ec2-vm/main.pkl 2>&1 | tee /tmp/formae-apply.txt
          if grep -qE "resource .+: Failed|reason for failure|apply command .+: Failed" /tmp/formae-apply.txt; then
            echo ""
            echo "::error::One or more resources failed to deploy. See details above."
            exit 1
          fi
